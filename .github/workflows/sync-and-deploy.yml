name: Sync upstream release and deploy to Cloudflare Pages

on:
  schedule:
    # 每小时检查一次上游是否有新 release
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest upstream release tag
        id: upstream
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/sub-store-org/Sub-Store-Front-End/releases/latest | jq -r '.tag_name')
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest upstream release: $LATEST_TAG"

      - name: Get current local version
        id: local
        run: |
          LOCAL_VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          echo "version=$LOCAL_VERSION" >> $GITHUB_OUTPUT
          echo "Current local version: $LOCAL_VERSION"

      - name: Check if update is needed
        id: check
        run: |
          UPSTREAM="${{ steps.upstream.outputs.tag }}"
          LOCAL="${{ steps.local.outputs.version }}"
          UPSTREAM_CLEAN="${UPSTREAM#v}"
          if [ "$UPSTREAM_CLEAN" != "$LOCAL" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "New version available: $UPSTREAM_CLEAN (current: $LOCAL)"
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "Already up to date: $LOCAL"
          fi

      - name: Sync upstream code (keep our workflow only)
        if: steps.check.outputs.needs_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 备份我们自己的 workflow 和配置
          cp -r .github/workflows /tmp/our-workflows
          cp wrangler.toml /tmp/wrangler.toml

          # 用上游代码完全覆盖项目（保留 .git）
          git remote add upstream https://github.com/sub-store-org/Sub-Store-Front-End.git
          git fetch upstream
          git checkout upstream/master -- .

          # 还原我们自己的文件
          rm -rf .github/workflows
          mkdir -p .github/workflows
          cp -r /tmp/our-workflows/* .github/workflows/
          cp /tmp/wrangler.toml wrangler.toml

          # 注入 packageManager 字段（上游没有，CI 需要锁定版本）
          node -e "
            const pkg = require('./package.json');
            pkg.packageManager = 'pnpm@9.15.9';
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # 删除上游的 Vercel 相关 workflow（如果有）
          rm -f .github/workflows/main.yml
          rm -f .github/workflows/update-vercel-project-settings.yml

          # 提交
          git add -A
          git commit -m "sync: upstream release ${{ steps.upstream.outputs.tag }}" || echo "No changes to commit"
          git push origin master

      - name: Set up Node.js
        if: steps.check.outputs.needs_update == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        if: steps.check.outputs.needs_update == 'true' || github.event_name == 'workflow_dispatch'
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        if: steps.check.outputs.needs_update == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          # 删除上游 lock 文件（包含 npmmirror 淘宝镜像源，CI 无法访问）
          rm -f pnpm-lock.yaml
          pnpm install --no-frozen-lockfile

      - name: Build
        if: steps.check.outputs.needs_update == 'true' || github.event_name == 'workflow_dispatch'
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        if: steps.check.outputs.needs_update == 'true' || github.event_name == 'workflow_dispatch'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=sub-store-front-end-cf
